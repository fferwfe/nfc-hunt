<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的積分</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root{--bg:#f5f5f7;--card:#fff;--border:#e5e5e7;--text:#1d1d1f;--text2:#6e6e73;--green:#1D9E75;--green2:#0F6E56;--gold:#b8941f;--red:#b8341f;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 16px 60px;}
  .container{max-width:480px;margin:0 auto;}
  .header{text-align:center;padding:28px 0 24px;}
  .header-icon{font-size:40px;margin-bottom:10px;}
  .header-title{font-size:22px;font-weight:900;margin-bottom:4px;}
  .header-sub{font-size:13px;color:var(--text2);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
  .card-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:14px;}
  .score-big{font-size:64px;font-weight:900;color:var(--green);text-align:center;line-height:1;}
  .score-sub{font-size:13px;color:var(--text2);text-align:center;margin-top:6px;}
  .breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
  .breakdown-item{background:var(--bg);border-radius:10px;padding:12px;text-align:center;}
  .breakdown-num{font-size:24px;font-weight:700;}
  .breakdown-label{font-size:11px;color:var(--text2);margin-top:2px;}
  .lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{width:30px;font-size:18px;text-align:center;}
  .lb-name{flex:1;font-size:14px;font-weight:500;}
  .lb-name.me{color:var(--green);font-weight:700;}
  .lb-score{font-size:16px;font-weight:700;}
  .lb-score.me{color:var(--green);}
  .setup-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;}
  .setup-title{font-size:18px;font-weight:700;margin-bottom:6px;}
  .setup-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
  .input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-family:'Noto Sans TC';font-size:16px;outline:none;margin-bottom:12px;}
  .input:focus{border-color:var(--green);}
  select.input{background:var(--card);}
  .btn{display:block;width:100%;padding:13px;border-radius:10px;font-family:'Noto Sans TC';font-size:15px;font-weight:700;cursor:pointer;border:none;text-align:center;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:active{background:var(--green2);}
  .btn-link{background:none;border:none;color:var(--text2);font-size:13px;text-decoration:underline;cursor:pointer;padding:8px;width:100%;text-align:center;}
  .nfc-progress{margin-top:8px;}
  .pdot-row{display:flex;gap:3px;margin-bottom:4px;}
  .pdot{flex:1;height:8px;background:var(--bg);border:1px solid var(--border);border-radius:2px;}
  .pdot.done{background:var(--red);border-color:var(--red);}
  .pdot.finish{background:var(--green);border-color:var(--green);}
  .loading{text-align:center;padding:40px;color:var(--text2);}
  .back-link{display:block;text-align:center;color:var(--text2);font-size:13px;text-decoration:none;margin-bottom:20px;}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回入口</a>

  <div id="setup-screen">
    <div class="header">
      <div class="header-icon">⭐</div>
      <div class="header-title">我的積分</div>
      <div class="header-sub">查看你的組別在所有活動的積分</div>
    </div>
    <div class="setup-card">
      <div class="setup-title">選擇你的組別</div>
      <div class="setup-sub">選擇或輸入你的組別名稱</div>
      <select class="input" id="group-select">
        <option value="">— 選擇組別 —</option>
      </select>
      <div class="setup-sub" style="margin-bottom:8px">或直接輸入</div>
      <input class="input" id="group-input" placeholder="組別名稱">
      <button class="btn btn-primary" onclick="checkScore()">查看積分</button>
    </div>
  </div>

  <div id="score-screen" style="display:none">
    <div class="header">
      <div class="header-icon">⭐</div>
      <div class="header-title" id="my-group-title">—</div>
      <div class="header-sub">累計積分總覽</div>
    </div>

    <div class="card">
      <div class="card-label">總積分</div>
      <div class="score-big" id="total-score">0</div>
      <div class="score-sub">全隊累計</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="breakdown-num" id="nfc-score">0</div>
          <div class="breakdown-label">🗺️ 尋寶</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-num" id="quiz-score">0</div>
          <div class="breakdown-label">🎮 搶答</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-num" id="bonus-score">0</div>
          <div class="breakdown-label">🎁 加分</div>
        </div>
      </div>
    </div>

    <div class="card" id="nfc-detail" style="display:none">
      <div class="card-label">🗺️ 尋寶進度</div>
      <div id="nfc-progress-display"></div>
    </div>

    <div class="card">
      <div class="card-label">🏆 總排行榜</div>
      <div id="total-lb"></div>
    </div>

    <button class="btn-link" onclick="resetGroup()">更換組別</button>
    <button class="btn-link" onclick="loadScore()">🔄 重新整理</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCtE0kZWmyt2UiAq2as5g65pfKIzm9QQE",
  authDomain: "nfc-hunt-a9cb3.firebaseapp.com",
  projectId: "nfc-hunt-a9cb3",
  storageBucket: "nfc-hunt-a9cb3.firebasestorage.app",
  messagingSenderId: "376155129888",
  appId: "1:376155129888:web:8d4d214f50777580325445"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

let myGroup = localStorage.getItem('score_group') || '';
let GROUPS = {};
let NFC_CONFIG = {};

async function init() {
  const [groupSnap, nfcSnap] = await Promise.all([
    getDoc(doc(db,'config','groups')),
    getDoc(doc(db,'config','nfc'))
  ]);
  if (groupSnap.exists()) GROUPS = groupSnap.data().groups || {};
  if (nfcSnap.exists()) NFC_CONFIG = nfcSnap.data();

  const sel = $('group-select');
  sel.innerHTML = '<option value="">— 選擇組別 —</option>' +
    Object.values(GROUPS).map(g=>`<option value="${g.name}">${g.name}</option>`).join('');

  if (myGroup) showScore();
}

window.checkScore = function() {
  const sel = $('group-select').value;
  const inp = $('group-input').value.trim();
  myGroup = sel || inp;
  if (!myGroup) { alert('請選擇或輸入組別名稱'); return; }
  localStorage.setItem('score_group', myGroup);
  showScore();
}

async function showScore() {
  $('setup-screen').style.display = 'none';
  $('score-screen').style.display = '';
  $('my-group-title').textContent = myGroup;
  await loadScore();
}

window.loadScore = async function() {
  // 找到這個組別的資料
  const groupData = Object.values(GROUPS).find(g=>g.name===myGroup);
  const nfc = groupData?.nfcPoints || 0;
  const quiz = groupData?.quizPoints || 0;
  const bonus = groupData?.bonusPoints || 0;
  const total = nfc + quiz + bonus;

  $('total-score').textContent = total;
  $('nfc-score').textContent = nfc;
  $('quiz-score').textContent = quiz;
  $('bonus-score').textContent = bonus;

  // NFC 進度
  const nfcSnap = await getDocs(collection(db,'teams'));
  const nfcTeam = nfcSnap.docs.map(d=>d.data()).find(t=>t.name===myGroup||t.id===myGroup);
  if (nfcTeam) {
    $('nfc-detail').style.display = '';
    const total_stations = NFC_CONFIG.routes?.[nfcTeam.route]?.stations||9;
    const dots = Array.from({length:total_stations},(_,i)=>{
      let cls='pdot';
      if(i+1<=nfcTeam.progress) cls+=i+1===total_stations?' finish':' done';
      return `<div class="${cls}"></div>`;
    }).join('');
    $('nfc-progress-display').innerHTML = `
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">路線 ${nfcTeam.route||'—'} · 進度 ${nfcTeam.progress||0}/${total_stations}</div>
      <div class="pdot-row">${dots}</div>`;
  }

  // 總排行榜
  const sorted = Object.values(GROUPS).map(g=>({
    name:g.name,
    total:(g.nfcPoints||0)+(g.quizPoints||0)+(g.bonusPoints||0)
  })).sort((a,b)=>b.total-a.total);

  $('total-lb').innerHTML = sorted.map((g,i)=>`
    <div class="lb-row">
      <div class="lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="lb-name ${g.name===myGroup?'me':''}">${g.name}${g.name===myGroup?' 👈':''}</div>
      <div class="lb-score ${g.name===myGroup?'me':''}">${g.total}</div>
    </div>`).join('') || '<div style="text-align:center;color:var(--text2);padding:20px">尚無資料</div>';
}

window.resetGroup = function() {
  localStorage.removeItem('score_group');
  myGroup = '';
  $('setup-screen').style.display = '';
  $('score-screen').style.display = 'none';
}

$('group-select').addEventListener('change',function(){ if(this.value) $('group-input').value=''; });
$('group-input').addEventListener('input',function(){ if(this.value) $('group-select').value=''; });

init();
</script>
</body>
</html>
