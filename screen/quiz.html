<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大螢幕 · 搶答遊戲</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root{--bg:#0a0a0f;--card:#16161e;--border:#2a2a3a;--text:#f0f0f5;--text2:#a0a0b0;--green:#1D9E75;--green2:#0F6E56;--red:#E24B4A;--yellow:#EF9F27;--gold:#FAC775;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:var(--card);}
  .game-title{font-size:18px;font-weight:700;letter-spacing:2px;}
  .q-num{font-size:14px;color:var(--text2);}
  .phase-pill{padding:4px 14px;border-radius:99px;font-size:12px;font-weight:500;}
  .phase-pill.wait{background:#1a1a2e;color:var(--text2);}
  .phase-pill.question{background:rgba(29,158,117,0.2);color:var(--green);}
  .phase-pill.board{background:rgba(239,159,39,0.2);color:var(--yellow);}
  .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}

  /* WAIT */
  .wait-screen{text-align:center;}
  .wait-icon{font-size:80px;margin-bottom:20px;animation:bounce 2s infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
  .wait-title{font-size:42px;font-weight:900;letter-spacing:4px;margin-bottom:8px;}
  .wait-sub{font-size:18px;color:var(--text2);}

  /* QUESTION */
  .question-screen{width:100%;max-width:1000px;}
  .q-label{font-size:13px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;text-align:center;}
  .q-text{font-size:28px;font-weight:700;text-align:center;line-height:1.5;margin-bottom:32px;}
  .elements-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
  .element-chip{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-align:center;}
  .element-label{font-size:12px;color:var(--text2);margin-bottom:6px;letter-spacing:1px;}
  .element-value{font-size:22px;font-weight:700;}
  .timer-section{text-align:center;}
  .timer-bar-bg{background:var(--card);border-radius:99px;height:14px;overflow:hidden;margin-bottom:12px;max-width:600px;margin-left:auto;margin-right:auto;}
  .timer-bar{height:100%;background:var(--green);border-radius:99px;transition:width 1s linear,background 0.5s;}
  .timer-num{font-size:64px;font-weight:900;line-height:1;}

  /* BUZZ BANNER */
  .buzz-banner{position:fixed;top:0;left:0;right:0;background:var(--green);color:#fff;text-align:center;padding:18px;font-size:24px;font-weight:700;letter-spacing:2px;transform:translateY(-100%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);z-index:100;}
  .buzz-banner.show{transform:translateY(0);}

  /* BOARD */
  .board-screen{width:100%;max-width:700px;}
  .board-title{font-size:28px;font-weight:900;text-align:center;letter-spacing:4px;margin-bottom:28px;}
  .board-row{display:flex;align-items:center;gap:20px;padding:16px 24px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;transition:all 0.4s;}
  .board-row.top1{border-color:var(--gold);background:rgba(250,199,117,0.1);}
  .board-rank{font-size:28px;width:40px;text-align:center;}
  .board-name{flex:1;font-size:22px;font-weight:700;}
  .board-score{font-size:28px;font-weight:900;color:var(--green);}
  .board-bar-wrap{flex:2;background:var(--border);border-radius:99px;height:10px;overflow:hidden;}
  .board-bar{height:100%;background:var(--green);border-radius:99px;transition:width 0.8s ease-out;}
  .board-row.top1 .board-bar{background:var(--gold);}
</style>
</head>
<body>
<div class="buzz-banner" id="buzz-banner">🔔 <span id="buzz-banner-text">— 搶答！—</span></div>

<div class="top-bar">
  <div class="game-title">🎮 搶答遊戲</div>
  <div class="q-num">第 <span id="q-num">1</span> 題</div>
  <div class="phase-pill wait" id="phase-pill">等待出題</div>
</div>

<div class="main">
  <!-- 等待 -->
  <div id="screen-wait" class="wait-screen">
    <div class="wait-icon">🎯</div>
    <div class="wait-title">搶 答 遊 戲</div>
    <div class="wait-sub">等待主持人出題...</div>
  </div>

  <!-- 題目 -->
  <div id="screen-question" class="question-screen" style="display:none">
    <div class="q-label">情 境 題</div>
    <div class="q-text" id="q-text-screen">—</div>
    <div class="elements-grid" id="elements-grid-screen"></div>
    <div class="timer-section">
      <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar-screen" style="width:100%"></div></div>
      <div class="timer-num" id="timer-num-screen">—</div>
    </div>
  </div>

  <!-- 排行榜 -->
  <div id="screen-board" class="board-screen" style="display:none">
    <div class="board-title">🏆 累計積分</div>
    <div id="board-rows"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCtE0kZWmyt2UiAq2as5g65pfKIzm9QQE",
  authDomain: "nfc-hunt-a9cb3.firebaseapp.com",
  projectId: "nfc-hunt-a9cb3",
  storageBucket: "nfc-hunt-a9cb3.firebasestorage.app",
  messagingSenderId: "376155129888",
  appId: "1:376155129888:web:8d4d214f50777580325445"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

let QUESTIONS = [];
let TIMER_SECS = 60;
let prevBuzzGroup = null;

async function init() {
  const snap = await getDoc(doc(db,'quiz','settings'));
  if (snap.exists()) {
    const d = snap.data();
    if (d.questions) QUESTIONS = d.questions;
    if (d.timerSecs) TIMER_SECS = d.timerSecs;
  }

  onSnapshot(doc(db,'quiz','game'), snap => {
    if (!snap.exists()) return;
    const state = snap.data();
    render(state);
  });
}

function showOnly(id) {
  ['screen-wait','screen-question','screen-board'].forEach(s=>{
    $(s).style.display = s===id?'':'none';
  });
}

function render(state) {
  const phase = state.phase || 'wait';
  $('q-num').textContent = (state.qIndex||0)+1;

  // phase pill
  const pill = $('phase-pill');
  const phaseMap = { wait:'等待出題', question:'搶答中', score:'評分中', board:'排行榜' };
  pill.textContent = phaseMap[phase]||'等待';
  pill.className = 'phase-pill ' + (phase==='question'?'question':phase==='board'?'board':'wait');

  if (phase==='wait'||phase==='score') {
    showOnly('screen-wait');
  } else if (phase==='question') {
    showOnly('screen-question');
    const q = QUESTIONS[state.qIndex % QUESTIONS.length];
    $('q-text-screen').textContent = q?.text||'—';
    const grid = $('elements-grid-screen');
    if (q?.elements) {
      grid.innerHTML = Object.entries(q.elements).map(([k,v])=>`
        <div class="element-chip">
          <div class="element-label">${k}</div>
          <div class="element-value">${v}</div>
        </div>`).join('');
    }
    // timer
    const left = state.timerLeft ?? TIMER_SECS;
    const pct = (left/TIMER_SECS)*100;
    const bar = $('timer-bar-screen');
    bar.style.width = pct+'%';
    bar.style.background = left>20?'#1D9E75':left>10?'#EF9F27':'#E24B4A';
    $('timer-num-screen').textContent = state.timerRunning ? left : (left===TIMER_SECS?'準備計時':left);

    // buzz banner
    if (state.buzzGroup && state.buzzGroup !== prevBuzzGroup) {
      prevBuzzGroup = state.buzzGroup;
      $('buzz-banner-text').textContent = `🔔 ${state.buzzGroup} 搶答！`;
      const banner = $('buzz-banner');
      banner.classList.add('show');
      setTimeout(()=>banner.classList.remove('show'), 3000);
      if (window.AudioContext || window.webkitAudioContext) {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value=880; g.gain.setValueAtTime(0.3,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
        o.start(); o.stop(ctx.currentTime+0.4);
      }
    } else if (!state.buzzGroup) {
      prevBuzzGroup = null;
    }
  } else if (phase==='board') {
    showOnly('screen-board');
    const sorted = Object.entries(state.totalScores||{}).sort((a,b)=>b[1]-a[1]);
    const maxScore = sorted[0]?.[1] || 1;
    $('board-rows').innerHTML = sorted.map(([g,s],i)=>`
      <div class="board-row ${i===0?'top1':''}">
        <div class="board-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div class="board-name">${g}</div>
        <div class="board-bar-wrap"><div class="board-bar" style="width:${(s/maxScore)*100}%"></div></div>
        <div class="board-score">${s}</div>
      </div>`).join('');
  }
}

init();
</script>
</body>
</html>
