<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>總積分榜 · 大螢幕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  :root{--bg:#0a0a0f;--card:#16161e;--border:#2a2a3a;--text:#f0f0f5;--text2:#a0a0b0;--green:#1D9E75;--gold:#FAC775;--red:#b8341f;--blue:#1f4e7a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  .topbar{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .topbar-title{font-size:20px;font-weight:900;letter-spacing:3px;}
  .topbar-sub{font-size:13px;color:var(--text2);}
  .main{flex:1;padding:32px 40px;}
  .lb-row{display:flex;align-items:center;gap:24px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 24px;margin-bottom:12px;transition:all 0.4s;}
  .lb-row.top1{border-color:var(--gold);background:rgba(250,199,117,0.08);}
  .lb-row.top2{border-color:#a0a0b0;}
  .lb-row.top3{border-color:#a05a2c;}
  .lb-rank{font-size:32px;width:48px;text-align:center;}
  .lb-name{flex:1;font-size:22px;font-weight:700;}
  .lb-breakdown{font-size:12px;color:var(--text2);display:flex;gap:12px;}
  .lb-bar-wrap{width:200px;background:var(--border);border-radius:99px;height:10px;overflow:hidden;}
  .lb-bar{height:100%;background:var(--green);border-radius:99px;transition:width 0.8s ease-out;}
  .lb-row.top1 .lb-bar{background:var(--gold);}
  .lb-score{font-size:28px;font-weight:900;color:var(--green);min-width:80px;text-align:right;}
  .lb-row.top1 .lb-score{color:var(--gold);}
  .empty{text-align:center;padding:80px;color:var(--text2);font-size:18px;}
</style>
</head>
<body>
<div class="topbar">
  <div><div class="topbar-title">🏆 總積分榜</div><div class="topbar-sub" id="activity-name">活動積分排行</div></div>
  <div style="font-size:13px;color:var(--text2)" id="last-update">—</div>
</div>
<div class="main" id="lb-container"><div class="empty">載入中...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBCtE0kZWmyt2UiAq2as5g65pfKIzm9QQE",
  authDomain: "nfc-hunt-a9cb3.firebaseapp.com",
  projectId: "nfc-hunt-a9cb3",
  storageBucket: "nfc-hunt-a9cb3.firebasestorage.app",
  messagingSenderId: "376155129888",
  appId: "1:376155129888:web:8d4d214f50777580325445"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

async function init() {
  const baseSnap = await getDoc(doc(db,'config','base'));
  if (baseSnap.exists() && baseSnap.data().activityName) {
    $('activity-name').textContent = baseSnap.data().activityName + ' · 總積分';
  }

  onSnapshot(doc(db,'config','groups'), snap => {
    if (!snap.exists()) return;
    const groups = Object.values(snap.data().groups||{});
    const sorted = groups.map(g=>({
      name:g.name,
      nfc:g.nfcPoints||0,
      quiz:g.quizPoints||0,
      bonus:g.bonusPoints||0,
      total:(g.nfcPoints||0)+(g.quizPoints||0)+(g.bonusPoints||0)
    })).sort((a,b)=>b.total-a.total);

    const maxScore = sorted[0]?.total || 1;
    const now = new Date();
    $('last-update').textContent = '更新：'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');

    if (!sorted.length) { $('lb-container').innerHTML = '<div class="empty">尚無組別資料</div>'; return; }

    $('lb-container').innerHTML = sorted.map((g,i)=>`
      <div class="lb-row ${i===0?'top1':i===1?'top2':i===2?'top3':''}">
        <div class="lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div>
          <div class="lb-name">${g.name}</div>
          <div class="lb-breakdown">
            <span>🗺️ 尋寶 ${g.nfc}</span>
            <span>🎮 搶答 ${g.quiz}</span>
            <span>🎁 加分 ${g.bonus}</span>
          </div>
        </div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${(g.total/maxScore)*100}%"></div></div>
        <div class="lb-score">${g.total}</div>
      </div>`).join('');
  });
}
init();
</script>
</body>
</html>
