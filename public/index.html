<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🔦 密令尋寶</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a;--panel:#111827;--border:#1e3a5f;
  --accent:#00d4ff;--accent2:#ff6b35;--success:#00ff88;
  --warn:#ffcc00;--text:#e2e8f0;--muted:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 40px;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:1;}
.wrap{position:relative;z-index:2;width:100%;max-width:480px;padding:0 16px;}
.topbar{width:100%;max-width:480px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:relative;z-index:2;margin-bottom:20px;}
.topbar-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);letter-spacing:.2em;}
.team-badge{background:var(--border);border:1px solid var(--accent);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent);font-weight:700;}
.stage-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.stage-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .4s;}
.stage-dot.done{background:var(--success);border-color:var(--success);color:#000;}
.stage-dot.current{background:var(--accent);border-color:var(--accent);color:#000;box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--accent);}50%{box-shadow:0 0 20px var(--accent);}}
.stage-line{flex:1;height:2px;background:var(--border);position:relative;overflow:hidden;}
.stage-line.done::after{content:'';position:absolute;inset:0;background:var(--success);}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden;animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.card-eyebrow{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.25em;color:var(--accent);margin-bottom:8px;}
.card-stage-num{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:transparent;-webkit-text-stroke:1px var(--border);line-height:1;position:absolute;top:16px;right:20px;opacity:.4;}
.card-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:16px;line-height:1.3;}
.clue-box{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:16px;margin-bottom:16px;}
.clue-label{font-size:10px;letter-spacing:.2em;color:var(--accent);font-weight:700;margin-bottom:8px;}
.clue-text{font-size:15px;line-height:1.8;color:var(--text);}
.hint-box{background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.25);border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;}
.hint-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.hint-content{font-size:13px;color:#ffa07a;line-height:1.6;}
.hint-content strong{color:var(--accent2);font-size:11px;letter-spacing:.1em;display:block;margin-bottom:2px;}
.nfc-zone{border:2px dashed var(--border);border-radius:12px;padding:28px 20px;text-align:center;position:relative;overflow:hidden;border-color:var(--accent);background:rgba(0,212,255,.05);animation:scanPulse 1.5s infinite;}
@keyframes scanPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.3);}50%{box-shadow:0 0 0 12px rgba(0,212,255,0);}}
.nfc-icon{font-size:40px;margin-bottom:8px;}
.nfc-main-text{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);letter-spacing:.15em;margin-bottom:4px;}
.nfc-sub-text{font-size:12px;color:var(--muted);}
.scan-rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.ring{position:absolute;border-radius:50%;border:1px solid var(--accent);opacity:0;animation:ringExpand 2.4s infinite;}
.ring:nth-child(1){width:60px;height:60px;animation-delay:0s;}
.ring:nth-child(2){width:100px;height:100px;animation-delay:.6s;}
.ring:nth-child(3){width:140px;height:140px;animation-delay:1.2s;}
@keyframes ringExpand{0%{opacity:.6;transform:scale(.5);}100%{opacity:0;transform:scale(1.5);}}
.success-card{display:none;text-align:center;padding:32px 20px;}
.success-card.show{display:block;animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;}
.success-icon{font-size:56px;margin-bottom:12px;}
.success-title{font-family:'Orbitron',monospace;font-size:18px;color:var(--success);letter-spacing:.1em;margin-bottom:6px;}
.success-msg{font-size:14px;color:var(--muted);line-height:1.7;}
.next-btn{margin-top:20px;background:var(--success);color:#000;border:none;border-radius:8px;padding:14px 32px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;cursor:pointer;width:100%;transition:all .2s;}
.next-btn:active{transform:scale(.97);}
.final-screen{display:none;text-align:center;padding:40px 20px;}
.final-screen.show{display:block;animation:cardIn .6s ease both;}
.final-trophy{font-size:72px;margin-bottom:16px;}
.final-title{font-family:'Orbitron',monospace;font-size:20px;color:var(--warn);letter-spacing:.1em;margin-bottom:8px;}
.final-time{font-size:13px;color:var(--muted);margin-bottom:20px;}
.rank-card{background:var(--panel);border:1px solid var(--warn);border-radius:12px;padding:20px;margin-bottom:16px;}
.rank-label{font-size:11px;letter-spacing:.2em;color:var(--warn);margin-bottom:4px;}
.rank-team{font-size:22px;font-weight:700;color:#fff;}
.leaderboard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px;}
.lb-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:.2em;color:var(--accent);margin-bottom:12px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{width:24px;text-align:center;font-weight:700;color:var(--muted);font-family:'Orbitron',monospace;font-size:11px;}
.lb-rank.gold{color:var(--warn);}
.lb-name{flex:1;font-weight:700;}
.lb-stage{color:var(--muted);font-size:12px;}
.lb-time{color:var(--accent);font-size:12px;font-family:'Orbitron',monospace;}
.setup-screen{padding:40px 0 20px;text-align:center;}
.setup-title{font-family:'Orbitron',monospace;font-size:22px;color:var(--accent);letter-spacing:.1em;margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--muted);margin-bottom:8px;}
.act-name-display{font-size:15px;color:#fff;font-weight:700;margin-bottom:24px;}
.setup-field{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-size:16px;font-family:'Noto Sans TC',sans-serif;color:var(--text);width:100%;outline:none;margin-bottom:12px;transition:border-color .2s;}
.setup-field:focus{border-color:var(--accent);}
.setup-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:14px;width:100%;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:.1em;cursor:pointer;}
.logo-big{font-size:48px;margin-bottom:16px;}
.err-box{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:8px;padding:16px;text-align:center;color:#ff6b81;font-size:14px;line-height:1.7;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🔦 密令尋寶</div>
  <div class="team-badge" id="teamBadge">─</div>
</div>
<div class="wrap">
  <div id="setupScreen" class="setup-screen">
    <div class="logo-big">🗺️</div>
    <div class="setup-title">TREASURE HUNT</div>
    <div class="setup-sub">活動名稱</div>
    <div class="act-name-display" id="actNameDisplay">載入中…</div>
    <input class="setup-field" id="teamInput" type="text" placeholder="輸入你的隊伍名稱" maxlength="12">
    <button class="setup-btn" onclick="startGame()">開始任務 →</button>
    <div id="noActivityMsg" class="err-box" style="display:none;margin-top:16px">
      ⚠️ 目前沒有進行中的活動<br>請聯絡工作人員
    </div>
  </div>
  <div id="gameScreen" style="display:none">
    <div class="stage-row" id="stageRow"></div>
    <div class="card" id="clueCard">
      <div class="card-stage-num" id="cardStageNum">01</div>
      <div class="card-eyebrow">MISSION</div>
      <div class="card-title" id="cardTitle">─</div>
      <div class="clue-box">
        <div class="clue-label">📜 線索</div>
        <div class="clue-text" id="cardClue">─</div>
      </div>
      <div class="hint-box" id="hintBox">
        <div class="hint-icon">🧭</div>
        <div class="hint-content"><strong>提示</strong><span id="cardHint">─</span></div>
      </div>
      <div class="nfc-zone">
        <div class="scan-rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
        <div class="nfc-icon">📡</div>
        <div class="nfc-main-text">等待刷卡</div>
        <div class="nfc-sub-text">找到 NFC 卡片並靠近手機</div>
      </div>
    </div>
    <div class="card success-card" id="successCard">
      <div class="success-icon">✅</div>
      <div class="success-title">卡片已驗證！</div>
      <div class="success-msg" id="successMsg">繼續前進！</div>
      <button class="next-btn" id="nextBtn" onclick="nextStage()">前往下一關 →</button>
    </div>
    <div class="leaderboard">
      <div class="lb-title">📊 即時排行</div>
      <div id="lbList"></div>
    </div>
  </div>
  <div id="finalScreen" class="final-screen">
    <div class="final-trophy">🏆</div>
    <div class="final-title">任務完成！</div>
    <div class="final-time" id="finalTime">完成時間：─</div>
    <div class="rank-card">
      <div class="rank-label">你的隊伍</div>
      <div class="rank-team" id="finalTeam">─</div>
    </div>
    <p style="font-size:13px;color:var(--muted);line-height:1.8">🎉 恭喜完成所有任務！<br>向營輔老師出示此畫面領取獎勵。</p>
    <div class="leaderboard" style="margin-top:20px">
      <div class="lb-title">🏅 最終排名</div>
      <div id="finalLbList"></div>
    </div>
  </div>
</div>
<script>
let STAGES = [];
let state = { team:'', currentStage:0, startTime:null, stageTimes:[], finished:false };

async function loadStages() {
  try {
    const res = await fetch('/api/stages');
    const data = await res.json();
    STAGES = data.stages || [];
    const nameEl = document.getElementById('actNameDisplay');
    if (STAGES.length) {
      nameEl.textContent = data.activityName || '尋寶活動';
    } else {
      nameEl.textContent = '─';
      document.getElementById('noActivityMsg').style.display = '';
      document.querySelector('.setup-btn').style.display = 'none';
      document.getElementById('teamInput').style.display = 'none';
    }
  } catch(e) {
    document.getElementById('actNameDisplay').textContent = '載入失敗';
  }
}

async function loadLeaderboard() {
  try {
    const res = await fetch('/api/leaderboard');
    return await res.json();
  } catch(e) { return []; }
}

async function pushLeaderboard() {
  await fetch('/api/leaderboard', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      team: state.team,
      stage: state.currentStage,
      finished: state.finished,
      totalTime: state.finished ? (Date.now() - state.startTime) : null
    })
  });
}

async function renderLeaderboard(targetId) {
  const lb = await loadLeaderboard();
  const el = document.getElementById(targetId);
  if (!lb.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:8px">尚無其他隊伍</div>'; return; }
  el.innerHTML = lb.slice(0,8).map((r,i) => {
    const isMe = r.team === state.team;
    const timeStr = r.finished ? formatTime(r.totalTime) : '─';
    return `<div class="lb-row" style="${isMe?'background:rgba(0,212,255,.07);border-radius:6px;padding:8px 4px;margin:0 -4px':''}">
      <div class="lb-rank ${i===0?'gold':''}">${i+1}</div>
      <div class="lb-name">${r.team}${isMe?' 👈':''}</div>
      <div class="lb-stage">關${r.stage}/${STAGES.length}</div>
      <div class="lb-time">${timeStr}</div>
    </div>`;
  }).join('');
}

function formatTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,'0')}`;
}

function startGame() {
  const name = document.getElementById('teamInput').value.trim();
  if (!name) { document.getElementById('teamInput').focus(); return; }
  if (!STAGES.length) return;
  state = { team:name, currentStage:1, startTime:Date.now(), stageTimes:[], finished:false };
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('teamBadge').textContent = name;
  renderStage();
  pushLeaderboard();
  renderLeaderboard('lbList');
}

function renderStage() {
  const s = STAGES[state.currentStage-1];
  document.getElementById('cardStageNum').textContent = String(state.currentStage).padStart(2,'0');
  document.getElementById('cardTitle').textContent = s.title;
  document.getElementById('cardClue').innerHTML = s.clue;
  document.getElementById('cardHint').textContent = s.hint || '繼續尋找！';
  const row = document.getElementById('stageRow');
  row.innerHTML = '';
  STAGES.forEach((st,i) => {
    const n = i+1;
    if (i>0) { const l=document.createElement('div'); l.className='stage-line'+(n<=state.currentStage?' done':''); row.appendChild(l); }
    const d=document.createElement('div');
    d.className='stage-dot'+(n<state.currentStage?' done':n===state.currentStage?' current':'');
    d.textContent = n<state.currentStage?'✓':n;
    row.appendChild(d);
  });
  document.getElementById('clueCard').style.display='';
  document.getElementById('successCard').classList.remove('show');
  const card=document.getElementById('clueCard');
  card.style.animation='none'; card.offsetHeight; card.style.animation='';
}

async function checkNFCParam() {
  const params = new URLSearchParams(window.location.search);
  const cardId = params.get('card');
  if (!cardId || !state.team || state.finished) return;
  const expected = STAGES[state.currentStage-1]?.cardId;
  if (cardId === expected) {
    state.stageTimes.push(Date.now());
    await pushLeaderboard();
    document.getElementById('clueCard').style.display='none';
    const sc=document.getElementById('successCard');
    sc.classList.add('show');
    const isLast = state.currentStage===STAGES.length;
    document.getElementById('successMsg').textContent = isLast ? '🎉 最後一關完成！你們找到寶藏了！' : `第 ${state.currentStage} 關完成！繼續尋找下一個 NFC 卡片。`;
    document.getElementById('nextBtn').textContent = isLast ? '查看最終結果 🏆' : '前往下一關 →';
    renderLeaderboard('lbList');
  } else if (cardId) {
    alert(`⚠️ 這不是這一關的卡片！\n請繼續尋找正確的 NFC 卡。`);
  }
  window.history.replaceState({}, '', window.location.pathname);
}

async function nextStage() {
  if (state.currentStage >= STAGES.length) { showFinal(); return; }
  state.currentStage++;
  document.getElementById('successCard').classList.remove('show');
  renderStage();
  renderLeaderboard('lbList');
}

async function showFinal() {
  state.finished = true;
  await pushLeaderboard();
  document.getElementById('gameScreen').style.display='none';
  const fs=document.getElementById('finalScreen');
  fs.classList.add('show');
  document.getElementById('finalTime').textContent = `完成時間：${formatTime(Date.now()-state.startTime)}`;
  document.getElementById('finalTeam').textContent = state.team;
  renderLeaderboard('finalLbList');
}

window.addEventListener('DOMContentLoaded', async () => {
  await loadStages();
  document.getElementById('teamInput').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });
  // 如果 URL 有 card 參數，等玩家輸入隊名後觸發
  const params = new URLSearchParams(window.location.search);
  if (params.get('card') && state.team) checkNFCParam();
});

// 刷卡後頁面載入時觸發
window.addEventListener('load', () => {
  if (state.team) checkNFCParam();
});
</script>
</body>
</html>
