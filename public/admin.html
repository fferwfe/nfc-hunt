<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🛠️ 尋寶後台</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--panel:#111827;--panel2:#1a2333;--border:#1e3a5f;--accent:#00d4ff;--accent2:#ff6b35;--success:#00ff88;--danger:#ff4757;--warn:#ffcc00;--text:#e2e8f0;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);letter-spacing:.2em;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:36px 28px;width:100%;max-width:360px;text-align:center;}
.login-icon{font-size:40px;margin-bottom:12px;}
.login-title{font-family:'Orbitron',monospace;font-size:16px;color:var(--accent);letter-spacing:.15em;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.field{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--text);width:100%;outline:none;margin-bottom:10px;transition:border-color .2s;}
.field:focus{border-color:var(--accent);}
textarea.field{resize:vertical;min-height:80px;}
.btn{border:none;border-radius:8px;padding:12px 20px;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#000;width:100%;justify-content:center;}
.btn-success{background:var(--success);color:#000;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border);}
.btn-warn{background:var(--warn);color:#000;}
.btn:active{transform:scale(.96);}
.btn:hover{opacity:.85;}
.err-msg{color:var(--danger);font-size:12px;margin-top:6px;display:none;}
.main{padding:20px 16px 60px;max-width:600px;margin:0 auto;}
.section-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:.2em;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.activity-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .2s;}
.activity-card.active-act{border-color:var(--accent);}
.activity-header{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.activity-header:hover{background:rgba(255,255,255,.03);}
.act-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s;}
.activity-card.active-act .act-dot{background:var(--success);box-shadow:0 0 8px var(--success);}
.act-name{flex:1;font-weight:700;font-size:15px;}
.act-meta{font-size:11px;color:var(--muted);}
.act-chevron{color:var(--muted);font-size:12px;transition:transform .3s;}
.activity-card.open .act-chevron{transform:rotate(180deg);}
.activity-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
.activity-card.open .activity-body{display:block;}
.stage-item{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.stage-num{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--border);flex-shrink:0;width:32px;text-align:center;line-height:1.3;}
.stage-info{flex:1;min-width:0;}
.stage-title-text{font-weight:700;font-size:14px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stage-clue-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stage-card-id{font-size:11px;color:var(--accent);font-family:'Orbitron',monospace;margin-top:4px;}
.stage-actions{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px;transition:all .2s;color:var(--text);}
.icon-btn:hover{border-color:var(--accent);}
.icon-btn.del:hover{border-color:var(--danger);color:var(--danger);}
.nfc-url-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;font-family:'Orbitron',monospace;color:var(--accent);word-break:break-all;margin-top:6px;cursor:pointer;transition:border-color .2s;position:relative;}
.nfc-url-box:hover{border-color:var(--accent);}
.copy-hint{font-size:10px;color:var(--muted);display:block;margin-top:3px;font-family:'Noto Sans TC',sans-serif;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px 20px;width:100%;max-width:480px;margin:auto;animation:modalIn .3s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);letter-spacing:.15em;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;letter-spacing:.15em;color:var(--muted);margin-bottom:5px;display:block;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.modal-actions .btn{flex:1;justify-content:center;}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--panel);border-radius:10px;padding:4px;}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:700;border-radius:7px;cursor:pointer;transition:all .2s;color:var(--muted);border:none;background:none;}
.tab.active{background:var(--accent);color:#000;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--accent);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px;}
.lb-rank{width:28px;font-family:'Orbitron',monospace;font-size:11px;color:var(--muted);font-weight:700;}
.lb-rank.gold{color:var(--warn);}
.lb-name{flex:1;font-weight:700;}
.lb-done{color:var(--success);font-size:11px;font-weight:700;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.1em;}
.badge-active{background:rgba(0,255,136,.15);color:var(--success);border:1px solid rgba(0,255,136,.3);}
.badge-inactive{background:rgba(100,116,139,.15);color:var(--muted);border:1px solid var(--border);}
.empty-state{text-align:center;color:var(--muted);font-size:13px;padding:24px 0;}
.pw-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
</style>
</head>
<body>
<div id="loginWrap" class="login-wrap">
  <div class="login-card">
    <div class="login-icon">🛠️</div>
    <div class="login-title">ADMIN PANEL</div>
    <div class="login-sub">尋寶後台管理系統</div>
    <input class="field" id="pwInput" type="password" placeholder="輸入管理員密碼">
    <div class="err-msg" id="pwErr">密碼錯誤，請再試一次</div>
    <button class="btn btn-primary" style="margin-top:10px" onclick="doLogin()">登入</button>
  </div>
</div>
<div id="appWrap" style="display:none">
  <div class="topbar">
    <div class="topbar-title">🛠️ 尋寶後台</div>
    <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" onclick="doLogout()">登出</button>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('activities')">活動管理</button>
      <button class="tab" onclick="switchTab('monitor')">即時監控</button>
      <button class="tab" onclick="switchTab('settings')">設定</button>
    </div>
    <div id="tab-activities">
      <div class="section-title">
        <span>活動列表</span>
        <button class="btn btn-success" style="padding:6px 14px;font-size:12px" onclick="openActivityModal()">＋ 新增活動</button>
      </div>
      <div id="activityList"></div>
    </div>
    <div id="tab-monitor" style="display:none">
      <div class="section-title">即時監控</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="statTeams">0</div><div class="stat-label">參賽隊伍</div></div>
        <div class="stat-card"><div class="stat-num" id="statFinished">0</div><div class="stat-label">完成隊伍</div></div>
      </div>
      <div class="section-title" style="margin-bottom:10px">排行榜</div>
      <div id="monitorLb"></div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:12px;font-size:13px" onclick="refreshMonitor()">🔄 重新整理</button>
      <button class="btn btn-danger" style="width:100%;justify-content:center;margin-top:8px;font-size:13px" onclick="clearLb()">🗑️ 清除所有玩家資料</button>
    </div>
    <div id="tab-settings" style="display:none">
      <div class="section-title">網站設定</div>
      <div class="form-group">
        <label class="form-label">NFC 卡片網址前綴（玩家頁網址）</label>
        <input class="field" id="siteUrlInput" type="url" placeholder="https://你的railway網址.railway.app">
        <div style="font-size:11px;color:var(--muted);margin-top:4px">設定後，關卡的 NFC 網址會自動產生</div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="saveSiteUrl()">儲存</button>
      <div class="pw-section">
        <div class="section-title" style="margin-bottom:12px">變更密碼</div>
        <div class="form-group"><label class="form-label">舊密碼</label><input class="field" id="oldPwInput" type="password" placeholder="舊密碼"></div>
        <div class="form-group"><label class="form-label">新密碼</label><input class="field" id="newPwInput" type="password" placeholder="新密碼"></div>
        <div class="form-group"><label class="form-label">確認新密碼</label><input class="field" id="newPwConfirm" type="password" placeholder="再輸入一次"></div>
        <button class="btn btn-warn" style="width:100%;justify-content:center" onclick="changePw()">變更密碼</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: 活動 -->
<div class="modal-overlay" id="activityModal">
  <div class="modal">
    <div class="modal-title" id="actModalTitle">新增活動</div>
    <div class="form-group"><label class="form-label">活動名稱</label><input class="field" id="actName" type="text" placeholder="例：2025 夏令營尋寶"></div>
    <div class="form-group"><label class="form-label">活動日期</label><input class="field" id="actDate" type="date"></div>
    <div class="form-group"><label class="form-label">狀態</label>
      <select class="field" id="actStatus"><option value="active">進行中</option><option value="inactive">停用</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('activityModal')">取消</button>
      <button class="btn btn-primary" onclick="saveActivity()">儲存</button>
    </div>
  </div>
</div>

<!-- MODAL: 關卡 -->
<div class="modal-overlay" id="stageModal">
  <div class="modal">
    <div class="modal-title" id="stageModalTitle">新增關卡</div>
    <div class="form-group"><label class="form-label">關卡標題</label><input class="field" id="stageTitle" type="text" placeholder="例：任務啟動：找到起點"></div>
    <div class="form-group"><label class="form-label">線索內容</label><textarea class="field" id="stageClue" placeholder="描述玩家需要去哪裡找 NFC 卡片…"></textarea></div>
    <div class="form-group"><label class="form-label">提示（選填）</label><input class="field" id="stageHint" type="text" placeholder="更直接的方向提示"></div>
    <div class="form-group"><label class="form-label">NFC 卡片 ID</label><input class="field" id="stageCardId" type="text" placeholder="NFC-001"></div>
    <div id="nfcUrlPreview" style="display:none">
      <div class="form-label" style="margin-top:4px">📡 寫入此網址到 NFC 卡片：</div>
      <div class="nfc-url-box" id="nfcUrlText" onclick="copyNfcUrl()">
        <span class="copy-hint">點擊複製</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('stageModal')">取消</button>
      <button class="btn btn-primary" onclick="saveStage()">儲存關卡</button>
    </div>
  </div>
</div>

<script>
let activities = [];
let siteUrl = localStorage.getItem('admin_siteUrl') || '';
let editingActId = null;
let editingStageIdx = null;
let currentActId = null;
let adminPw = '';

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

async function doLogin(){
  const pw = document.getElementById('pwInput').value;
  const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const data = await res.json();
  if(data.ok){
    adminPw = pw;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').style.display='block';
    await loadActivities();
  } else {
    document.getElementById('pwErr').style.display='block';
  }
}

function doLogout(){
  adminPw='';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('appWrap').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('pwErr').style.display='none';
}

async function loadActivities(){
  const res = await fetch('/api/activities');
  activities = await res.json();
  renderActivities();
}

function switchTab(tab){
  ['activities','monitor','settings'].forEach((t,i)=>{
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
  });
  if(tab==='monitor') refreshMonitor();
  if(tab==='settings') document.getElementById('siteUrlInput').value = siteUrl;
}

function renderActivities(){
  const el = document.getElementById('activityList');
  if(!activities.length){ el.innerHTML='<div class="empty-state">還沒有活動，點右上角新增！</div>'; return; }
  el.innerHTML = activities.map(act=>`
    <div class="activity-card ${act.status==='active'?'active-act':''}" id="act-${act.id}">
      <div class="activity-header" onclick="toggleAct('${act.id}')">
        <div class="act-dot"></div>
        <div>
          <div class="act-name">${act.name}</div>
          <div class="act-meta">${act.date||'未設定日期'} ・ ${act.stages.length} 關卡</div>
        </div>
        <span class="badge ${act.status==='active'?'badge-active':'badge-inactive'}">${act.status==='active'?'進行中':'停用'}</span>
        <span class="act-chevron">▼</span>
      </div>
      <div class="activity-body">
        <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap">
          <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="openActivityModal('${act.id}')">✏️ 編輯</button>
          <button class="btn ${act.status==='active'?'btn-ghost':'btn-success'}" style="font-size:12px;padding:6px 12px" onclick="toggleActive('${act.id}')">${act.status==='active'?'⏸ 停用':'▶ 啟用'}</button>
          <button class="btn btn-danger" style="font-size:12px;padding:6px 12px" onclick="deleteActivity('${act.id}')">🗑️ 刪除</button>
        </div>
        <div class="section-title" style="margin-bottom:8px">
          <span>關卡（${act.stages.length} 關）</span>
          <button class="btn btn-success" style="font-size:11px;padding:5px 10px" onclick="openStageModal('${act.id}')">＋ 新增關卡</button>
        </div>
        <div>
          ${act.stages.length ? act.stages.map((s,i)=>`
            <div class="stage-item">
              <div class="stage-num">${String(i+1).padStart(2,'0')}</div>
              <div class="stage-info">
                <div class="stage-title-text">${s.title}</div>
                <div class="stage-clue-preview">${s.clue}</div>
                <div class="stage-card-id">📡 ${s.cardId}</div>
                ${siteUrl?`<div class="nfc-url-box" onclick="copyText('${siteUrl}/?card=${s.cardId}',this)">
                  ${siteUrl}/?card=${s.cardId}
                  <span class="copy-hint">點擊複製網址</span>
                </div>`:'<div style="font-size:11px;color:var(--muted);margin-top:4px">⚠️ 請在設定頁填入網址</div>'}
              </div>
              <div class="stage-actions">
                <button class="icon-btn" onclick="moveStage('${act.id}',${i},-1)" ${i===0?'disabled':''}>↑</button>
                <button class="icon-btn" onclick="moveStage('${act.id}',${i},1)" ${i===act.stages.length-1?'disabled':''}>↓</button>
                <button class="icon-btn" onclick="openStageModal('${act.id}',${i})">✏️</button>
                <button class="icon-btn del" onclick="deleteStage('${act.id}',${i})">🗑️</button>
              </div>
            </div>
          `).join('') : '<div class="empty-state" style="padding:12px 0">還沒有關卡</div>'}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleAct(id){
  document.getElementById('act-'+id).classList.toggle('open');
}

function openActivityModal(id){
  editingActId = id||null;
  if(id){
    const act = activities.find(a=>a.id===id);
    document.getElementById('actModalTitle').textContent='編輯活動';
    document.getElementById('actName').value=act.name;
    document.getElementById('actDate').value=act.date||'';
    document.getElementById('actStatus').value=act.status;
  } else {
    document.getElementById('actModalTitle').textContent='新增活動';
    document.getElementById('actName').value='';
    document.getElementById('actDate').value='';
    document.getElementById('actStatus').value='active';
  }
  document.getElementById('activityModal').classList.add('open');
}

async function saveActivity(){
  const name=document.getElementById('actName').value.trim();
  if(!name){alert('請輸入活動名稱');return;}
  let act;
  if(editingActId){
    act = activities.find(a=>a.id===editingActId);
    act.name=name; act.date=document.getElementById('actDate').value; act.status=document.getElementById('actStatus').value;
  } else {
    act = {id:genId(),name,date:document.getElementById('actDate').value,status:document.getElementById('actStatus').value,stages:[]};
    activities.push(act);
  }
  await fetch('/api/activities',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(act)});
  closeModal('activityModal');
  renderActivities();
}

async function deleteActivity(id){
  if(!confirm('確定刪除這個活動？')) return;
  await fetch('/api/activities/'+id,{method:'DELETE'});
  activities = activities.filter(a=>a.id!==id);
  renderActivities();
}

async function toggleActive(id){
  const act = activities.find(a=>a.id===id);
  act.status = act.status==='active'?'inactive':'active';
  await fetch('/api/activities',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(act)});
  renderActivities();
}

function openStageModal(actId,idx){
  currentActId=actId;
  editingStageIdx=idx!==undefined?idx:null;
  const act=activities.find(a=>a.id===actId);
  if(editingStageIdx!==null){
    const s=act.stages[editingStageIdx];
    document.getElementById('stageModalTitle').textContent=`編輯第 ${editingStageIdx+1} 關`;
    document.getElementById('stageTitle').value=s.title;
    document.getElementById('stageClue').value=s.clue;
    document.getElementById('stageHint').value=s.hint||'';
    document.getElementById('stageCardId').value=s.cardId;
  } else {
    const n=act.stages.length+1;
    document.getElementById('stageModalTitle').textContent=`新增第 ${n} 關`;
    document.getElementById('stageTitle').value='';
    document.getElementById('stageClue').value='';
    document.getElementById('stageHint').value='';
    document.getElementById('stageCardId').value=`NFC-${String(n).padStart(3,'0')}`;
  }
  updateNfcPreview();
  document.getElementById('stageModal').classList.add('open');
}

function updateNfcPreview(){
  const cardId=document.getElementById('stageCardId').value.trim();
  const preview=document.getElementById('nfcUrlPreview');
  const urlText=document.getElementById('nfcUrlText');
  if(siteUrl&&cardId){
    preview.style.display='';
    urlText.innerHTML=`${siteUrl}/?card=${cardId}<span class="copy-hint">點擊複製</span>`;
  } else { preview.style.display='none'; }
}

async function saveStage(){
  const title=document.getElementById('stageTitle').value.trim();
  const clue=document.getElementById('stageClue').value.trim();
  const hint=document.getElementById('stageHint').value.trim();
  const cardId=document.getElementById('stageCardId').value.trim();
  if(!title||!clue||!cardId){alert('請填入標題、線索和卡片 ID');return;}
  const act=activities.find(a=>a.id===currentActId);
  const stage={title,clue,hint,cardId};
  if(editingStageIdx!==null){ act.stages[editingStageIdx]=stage; }
  else { act.stages.push(stage); }
  await fetch('/api/activities',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(act)});
  closeModal('stageModal');
  renderActivities();
  setTimeout(()=>{ const c=document.getElementById('act-'+currentActId); if(c&&!c.classList.contains('open')) c.classList.add('open'); },50);
}

async function deleteStage(actId,idx){
  if(!confirm('確定刪除這一關？')) return;
  const act=activities.find(a=>a.id===actId);
  act.stages.splice(idx,1);
  await fetch('/api/activities',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(act)});
  renderActivities();
  setTimeout(()=>{ const c=document.getElementById('act-'+actId); if(c&&!c.classList.contains('open')) c.classList.add('open'); },50);
}

async function moveStage(actId,idx,dir){
  const act=activities.find(a=>a.id===actId);
  const ni=idx+dir;
  if(ni<0||ni>=act.stages.length) return;
  [act.stages[idx],act.stages[ni]]=[act.stages[ni],act.stages[idx]];
  await fetch('/api/activities',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(act)});
  renderActivities();
  setTimeout(()=>{ const c=document.getElementById('act-'+actId); if(c&&!c.classList.contains('open')) c.classList.add('open'); },50);
}

async function refreshMonitor(){
  const res=await fetch('/api/leaderboard');
  const lb=await res.json();
  document.getElementById('statTeams').textContent=lb.length;
  document.getElementById('statFinished').textContent=lb.filter(r=>r.finished).length;
  const active=activities.find(a=>a.status==='active');
  const total=active?active.stages.length:'?';
  const el=document.getElementById('monitorLb');
  if(!lb.length){el.innerHTML='<div class="empty-state">目前沒有玩家資料</div>';return;}
  el.innerHTML=lb.map((r,i)=>`
    <div class="lb-row">
      <div class="lb-rank ${i===0?'gold':''}">${i+1}</div>
      <div class="lb-name">${r.team}</div>
      <div style="font-size:12px;color:var(--muted)">關${r.stage}/${total}</div>
      ${r.finished?`<div class="lb-done">✅ ${formatTime(r.totalTime)}</div>`:'<div style="font-size:12px;color:var(--muted)">進行中</div>'}
    </div>
  `).join('');
}

async function clearLb(){
  if(!confirm('確定清除所有玩家資料？')) return;
  await fetch('/api/leaderboard',{method:'DELETE'});
  refreshMonitor();
}

function formatTime(ms){ const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function saveSiteUrl(){
  let url=document.getElementById('siteUrlInput').value.trim().replace(/\/$/,'');
  if(!url){alert('請輸入網址');return;}
  if(!url.startsWith('http')) url='https://'+url;
  siteUrl=url;
  localStorage.setItem('admin_siteUrl',siteUrl);
  renderActivities();
  alert('✅ 已儲存！');
}

async function changePw(){
  const oldPw=document.getElementById('oldPwInput').value;
  const newPw=document.getElementById('newPwInput').value;
  const confirm2=document.getElementById('newPwConfirm').value;
  if(!newPw){alert('請輸入新密碼');return;}
  if(newPw!==confirm2){alert('兩次密碼不一致');return;}
  const res=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oldPw,newPw})});
  const data=await res.json();
  if(data.ok){ alert('✅ 密碼已變更！'); document.getElementById('oldPwInput').value=''; document.getElementById('newPwInput').value=''; document.getElementById('newPwConfirm').value=''; }
  else { alert('❌ '+data.msg); }
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function copyText(text,el){
  navigator.clipboard.writeText(text).then(()=>{
    const hint=el.querySelector('.copy-hint');
    if(hint){ hint.textContent='✅ 已複製！'; setTimeout(()=>hint.textContent='點擊複製網址',1500); }
  });
}

function copyNfcUrl(){
  const cardId=document.getElementById('stageCardId').value.trim();
  if(siteUrl&&cardId) copyText(`${siteUrl}/?card=${cardId}`, document.getElementById('nfcUrlText'));
}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('pwInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('stageCardId').addEventListener('input',updateNfcPreview);
});
</script>
