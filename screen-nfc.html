<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>尋寶排行榜 · 大螢幕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  :root{--bg:#0a0a0f;--card:#16161e;--border:#2a2a3a;--text:#f0f0f5;--text2:#a0a0b0;--green:#1D9E75;--red:#b8341f;--gold:#FAC775;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  .topbar{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .topbar-title{font-size:20px;font-weight:900;letter-spacing:3px;}
  .main{flex:1;padding:32px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;align-content:start;}
  .team-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
  .team-card.finished{border-color:var(--green);}
  .team-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .team-name{font-size:18px;font-weight:700;}
  .route-badge{font-size:12px;background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:99px;}
  .pdot-row{display:flex;gap:4px;margin-bottom:8px;}
  .pdot{flex:1;height:10px;background:rgba(255,255,255,0.1);border-radius:2px;}
  .pdot.done{background:var(--red);}
  .pdot.finish{background:var(--green);}
  .team-meta{font-size:12px;color:var(--text2);}
  .finish-badge{font-size:11px;background:rgba(29,158,117,0.2);color:var(--green);padding:3px 8px;border-radius:99px;font-weight:700;}
  .empty{text-align:center;padding:80px;color:var(--text2);font-size:18px;grid-column:1/-1;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🗺️ 尋寶進度</div>
  <div style="font-size:13px;color:var(--text2)" id="last-update">—</div>
</div>
<div class="main" id="main-grid"><div class="empty">載入中...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBCtE0kZWmyt2UiAq2as5g65pfKIzm9QQE",
  authDomain: "nfc-hunt-a9cb3.firebaseapp.com",
  projectId: "nfc-hunt-a9cb3",
  storageBucket: "nfc-hunt-a9cb3.firebasestorage.app",
  messagingSenderId: "376155129888",
  appId: "1:376155129888:web:8d4d214f50777580325445"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);
let NFC_CONFIG = {};

async function init() {
  const nfcSnap = await getDoc(doc(db,'config','nfc'));
  if (nfcSnap.exists()) NFC_CONFIG = nfcSnap.data();

  onSnapshot(collection(db,'teams'), snap => {
    const teams = snap.docs.map(d=>({id:d.id,...d.data()}));
    teams.sort((a,b)=>(b.progress||0)-(a.progress||0));
    const now = new Date();
    $('last-update').textContent = '更新：'+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    if (!teams.length) { $('main-grid').innerHTML='<div class="empty">等待玩家掃卡...</div>'; return; }
    $('main-grid').innerHTML = teams.map(t=>{
      const total=NFC_CONFIG.routes?.[t.route]?.stations||9;
      const isFinish=(t.progress||0)>=total;
      const dots=Array.from({length:total},(_,i)=>{let cls='pdot';if(i+1<=(t.progress||0))cls+=i+1===total?' finish':' done';return`<div class="${cls}"></div>`;}).join('');
      return `<div class="team-card ${isFinish?'finished':''}">
        <div class="team-head">
          <div class="team-name">${t.name||t.id}</div>
          ${isFinish?'<span class="finish-badge">✅ 完成</span>':`<span class="route-badge">${t.route?'路線 '+t.route:'未起跑'}</span>`}
        </div>
        <div class="pdot-row">${dots}</div>
        <div class="team-meta">${t.progress||0}/${total} 站 · ${t.points||0} 分 · 錯誤 ${t.errors||0}</div>
      </div>`;
    }).join('');
  });
}
init();
</script>
</body>
</html>
