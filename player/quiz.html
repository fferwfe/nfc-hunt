<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搶答 · 玩家</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#f5f5f7;--card:#fff;--border:#e5e5e7;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;--green:#1D9E75;--green2:#0F6E56;--red:#E24B4A;--yellow:#EF9F27;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .container{width:100%;max-width:400px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;text-align:center;}
  .phase-badge{display:inline-block;background:#f0f0f5;color:var(--text2);font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;margin-bottom:12px;letter-spacing:0.5px;}
  .phase-badge.active{background:#f0fdf8;color:var(--green2);}
  .group-name{font-size:22px;font-weight:700;margin-bottom:4px;}
  .group-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
  .big-buzz-btn{width:100%;padding:28px;font-size:26px;font-weight:700;background:var(--green);color:#fff;border:none;border-radius:14px;cursor:pointer;transition:transform 0.08s,background 0.1s;letter-spacing:2px;user-select:none;}
  .big-buzz-btn:active{transform:scale(0.95);background:var(--green2);}
  .big-buzz-btn.buzzed{background:#0F6E56;}
  .big-buzz-btn.disabled{background:#ccc;cursor:not-allowed;}
  .buzz-status{font-size:13px;color:var(--text2);margin-top:12px;min-height:20px;}
  .buzz-status.success{color:var(--green2);font-weight:500;}
  .buzz-status.fail{color:var(--red);}
  .timer-wrap{margin-top:16px;}
  .timer-bar-bg{background:var(--bg);border-radius:99px;height:8px;overflow:hidden;margin-bottom:6px;}
  .timer-bar{height:100%;background:var(--green);border-radius:99px;transition:width 1s linear,background 0.5s;}
  .timer-text{font-size:13px;color:var(--text2);}
  .timer-num{font-weight:600;color:var(--text);}
  .score-display{font-size:36px;font-weight:700;color:var(--green);margin:8px 0;}
  .score-label{font-size:13px;color:var(--text2);}
  .setup-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;}
  .setup-title{font-size:18px;font-weight:700;margin-bottom:4px;}
  .setup-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
  .setup-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-family:'Noto Sans TC';font-size:16px;outline:none;margin-bottom:12px;}
  .setup-input:focus{border-color:var(--green);}
  .setup-select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-family:'Noto Sans TC';font-size:16px;outline:none;margin-bottom:12px;background:var(--card);}
  .setup-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:'Noto Sans TC';font-size:16px;font-weight:700;cursor:pointer;}
  .setup-btn:active{background:var(--green2);}
  .wait-state{padding:40px 0;text-align:center;}
  .wait-icon{font-size:48px;margin-bottom:12px;}
  .wait-text{font-size:16px;font-weight:500;margin-bottom:4px;}
  .wait-sub{font-size:13px;color:var(--text2);}
  .lb-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
  .lb-row:last-child{border-bottom:none;}
  .lb-name{font-size:14px;font-weight:500;}
  .lb-score{font-size:15px;font-weight:700;}
  .lb-me{color:var(--green2);}
</style>
</head>
<body>
<div style="padding:12px 16px 0;max-width:400px;margin:0 auto">
  <a href="index.html" style="font-size:13px;color:#6e6e73;text-decoration:none;padding:4px 8px;border:1px solid #e5e5e7;border-radius:8px;background:#fff">← 返回積分頁</a>
</div>
<div class="container">
  <!-- 設定畫面 -->
  <div id="setup-screen">
    <div class="setup-card">
      <div class="setup-title">🎮 搶答遊戲</div>
      <div class="setup-sub">輸入組別名稱加入遊戲</div>
      <input class="setup-input" id="group-input" type="text" placeholder="你們的組別名稱">
      <div class="setup-sub" style="margin-bottom:8px">或從清單選擇</div>
      <select class="setup-select" id="group-select">
        <option value="">— 選擇組別 —</option>
      </select>
      <button class="setup-btn" onclick="joinGame()">加入遊戲</button>
    </div>
  </div>

  <!-- 遊戲畫面 -->
  <div id="game-screen" style="display:none">
    <div class="card">
      <div class="phase-badge" id="phase-badge">等待出題</div>
      <div class="group-name" id="my-group-name">—</div>
      <div class="group-sub">目前分數：<strong id="my-score">0</strong> 分</div>

      <!-- 等待狀態 -->
      <div id="wait-state" class="wait-state">
        <div class="wait-icon">⏳</div>
        <div class="wait-text">等待主持人出題</div>
        <div class="wait-sub">題目出現後即可搶答</div>
      </div>

      <!-- 搶答按鈕 -->
      <div id="buzz-state" style="display:none">
        <button class="big-buzz-btn" id="buzz-btn" onclick="doBuzz()">搶　答</button>
        <div class="buzz-status" id="buzz-status"></div>
        <div class="timer-wrap">
          <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
          <div class="timer-text">剩餘 <span class="timer-num" id="timer-count">60</span> 秒</div>
        </div>
      </div>

      <!-- 排行榜 -->
      <div id="board-state" style="display:none">
        <div class="score-display" id="my-score-big">0</div>
        <div class="score-label">你的總分</div>
        <div style="margin-top:16px" id="lb-list"></div>
      </div>
    </div>

    <button onclick="leaveGame()" style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:8px;text-decoration:underline">更換組別</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCtE0kZWmyt2UiAq2as5g65pfKIzm9QQE",
  authDomain: "nfc-hunt-a9cb3.firebaseapp.com",
  projectId: "nfc-hunt-a9cb3",
  storageBucket: "nfc-hunt-a9cb3.firebasestorage.app",
  messagingSenderId: "376155129888",
  appId: "1:376155129888:web:8d4d214f50777580325445"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const $ = id => document.getElementById(id);

let myGroup = localStorage.getItem('quiz_group') || localStorage.getItem('player_group') || '';
let gameState = {};
let TIMER_SECS = 60;

const gameRef = doc(db,'quiz','game');
const settingsRef = doc(db,'quiz','settings');
const groupsConfigRef = doc(db,'config','groups');

async function init() {
  // 載入組別清單（優先從 config/groups，fallback 到 quiz/settings.groups）
  const [groupsSnap, settSnap] = await Promise.all([
    getDoc(groupsConfigRef),
    getDoc(settingsRef)
  ]);

  let groupNames = [];
  if (groupsSnap.exists()) {
    groupNames = Object.values(groupsSnap.data().groups || {}).map(g => g.name).filter(Boolean);
  }
  if (!groupNames.length && settSnap.exists() && settSnap.data().groups) {
    groupNames = settSnap.data().groups;
  }
  if (settSnap.exists() && settSnap.data().timerSecs) TIMER_SECS = settSnap.data().timerSecs;

  if (groupNames.length) {
    const sel = $('group-select');
    sel.innerHTML = '<option value="">— 選擇組別 —</option>' + groupNames.map(g=>`<option value="${g}">${g}</option>`).join('');
    // 自動選中已存的組別
    if (myGroup) sel.value = myGroup;
  }
  if (myGroup) $('group-input').value = myGroup;

  if (myGroup) {
    showGame();
  }

  onSnapshot(gameRef, snap => {
    if (snap.exists()) {
      gameState = snap.data();
      if (myGroup) renderGame();
    }
  });
}

window.joinGame = function() {
  const input = $('group-input').value.trim();
  const select = $('group-select').value;
  myGroup = input || select;
  if (!myGroup) { alert('請輸入或選擇組別名稱'); return; }
  localStorage.setItem('quiz_group', myGroup);
  showGame();
}

window.leaveGame = function() {
  localStorage.removeItem('quiz_group');
  myGroup = '';
  $('setup-screen').style.display = '';
  $('game-screen').style.display = 'none';
}

function showGame() {
  $('setup-screen').style.display = 'none';
  $('game-screen').style.display = '';
  $('my-group-name').textContent = myGroup;
  renderGame();
}

function renderGame() {
  const phase = gameState.phase || 'wait';
  const myScore = gameState.totalScores?.[myGroup] || 0;
  $('my-score').textContent = myScore;
  $('my-score-big').textContent = myScore;

  // phase badge
  const badgeEl = $('phase-badge');
  const phaseMap = { wait:'等待出題', question:'搶答中！', score:'評分中', board:'排行榜' };
  badgeEl.textContent = phaseMap[phase] || '等待出題';
  badgeEl.className = 'phase-badge' + (phase==='question'?' active':'');

  // show/hide sections
  $('wait-state').style.display = phase==='wait' ? '' : 'none';
  $('buzz-state').style.display = phase==='question' ? '' : 'none';
  $('board-state').style.display = phase==='board' ? '' : 'none';

  if (phase === 'question') {
    // timer - self-calculate from timerStartedAt so we don't rely on admin's interval
    let left = gameState.timerLeft ?? TIMER_SECS;
    if (gameState.timerRunning && gameState.timerStartedAt) {
      const elapsed = Math.floor((Date.now() - gameState.timerStartedAt) / 1000);
      left = Math.max(0, (gameState.timerSnapshotLeft ?? TIMER_SECS) - elapsed);
    }
    const pct = (left / TIMER_SECS) * 100;
    const bar = $('timer-bar');
    bar.style.width = pct+'%';
    bar.style.background = left>20?'#1D9E75':left>10?'#EF9F27':'#E24B4A';
    $('timer-count').textContent = left;

    // buzz state
    const buzzBtn = $('buzz-btn');
    const buzzStatus = $('buzz-status');
    if (gameState.buzzGroup) {
      if (gameState.buzzGroup === myGroup) {
        buzzBtn.textContent = '✓ 已搶答！';
        buzzBtn.className = 'big-buzz-btn buzzed';
        buzzStatus.textContent = '你們組搶到了！等待主持人確認';
        buzzStatus.className = 'buzz-status success';
      } else {
        buzzBtn.textContent = '已被搶答';
        buzzBtn.className = 'big-buzz-btn disabled';
        buzzStatus.textContent = `${gameState.buzzGroup} 搶先一步！`;
        buzzStatus.className = 'buzz-status fail';
      }
    } else {
      buzzBtn.textContent = '搶　答';
      buzzBtn.className = 'big-buzz-btn';
      buzzStatus.textContent = '';
      buzzStatus.className = 'buzz-status';
    }
  }

  if (phase === 'board') {
    const sorted = Object.entries(gameState.totalScores||{}).sort((a,b)=>b[1]-a[1]);
    $('lb-list').innerHTML = sorted.map(([g,s],i)=>`
      <div class="lb-row ${g===myGroup?'lb-me':''}">
        <div class="lb-name">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'　'} ${g}${g===myGroup?' 👈':''}</div>
        <div class="lb-score">${s} 分</div>
      </div>`).join('');
  }
}

window.doBuzz = async function() {
  if (gameState.buzzGroup) return;
  if (gameState.phase !== 'question') return;
  gameState.buzzGroup = myGroup;
  gameState.buzzTime = Date.now();
  await setDoc(gameRef, gameState);
  if (navigator.vibrate) navigator.vibrate([100,50,100]);
}

$('group-select').addEventListener('change', function() {
  if (this.value) $('group-input').value = '';
});
$('group-input').addEventListener('input', function() {
  if (this.value) $('group-select').value = '';
});
$('group-input').addEventListener('keydown', e => { if(e.key==='Enter') joinGame(); });

init();
</script>
</body>
</html>
