<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>活動系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root{--bg:#f5f5f7;--card:#fff;--border:#e5e5e7;--text:#1d1d1f;--text2:#6e6e73;--green:#1D9E75;--green2:#0F6E56;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
  .container{width:100%;max-width:400px;}
  .header{text-align:center;padding:0 0 32px;}
  .header-icon{font-size:52px;margin-bottom:14px;}
  .header-title{font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:6px;}
  .header-sub{font-size:13px;color:var(--text2);}
  .card-link{display:flex;align-items:center;gap:16px;background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;margin-bottom:12px;text-decoration:none;color:var(--text);transition:all 0.15s;cursor:pointer;}
  .card-link:hover,.card-link:active{border-color:var(--green);transform:scale(0.99);box-shadow:0 4px 20px rgba(0,0,0,0.1);}
  .card-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
  .card-icon.player{background:rgba(29,158,117,0.12);}
  .card-icon.admin{background:rgba(31,78,122,0.1);}
  .card-icon.screen{background:rgba(184,148,31,0.1);}
  .card-body{flex:1;}
  .card-title{font-size:17px;font-weight:700;margin-bottom:3px;}
  .card-desc{font-size:12px;color:var(--text2);line-height:1.5;}
  .card-arrow{font-size:22px;color:var(--text2);}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;padding-left:4px;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">🎯</div>
    <div class="header-title">活 動 系 統</div>
    <div class="header-sub">請選擇你的身份</div>
  </div>

  <div class="section-label">📱 玩家入口</div>
  <a href="player/index.html" class="card-link">
    <div class="card-icon player">🙋</div>
    <div class="card-body">
      <div class="card-title">我是玩家</div>
      <div class="card-desc">輸入組別，選擇 NFC 尋寶或搶答遊戲</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div class="divider"></div>

  <div class="section-label">📺 大螢幕</div>
  <a href="screen/nfc.html" class="card-link">
    <div class="card-icon screen">🗺️</div>
    <div class="card-body">
      <div class="card-title">尋寶排行榜</div>
      <div class="card-desc">各組尋寶即時進度</div>
    </div>
    <div class="card-arrow">›</div>
  </a>
  <a href="screen/quiz.html" class="card-link">
    <div class="card-icon screen">🎮</div>
    <div class="card-body">
      <div class="card-title">搶答大螢幕</div>
      <div class="card-desc">題目、計時、搶答結果</div>
    </div>
    <div class="card-arrow">›</div>
  </a>
  <a href="screen/total.html" class="card-link">
    <div class="card-icon screen">🏆</div>
    <div class="card-body">
      <div class="card-title">總積分榜</div>
      <div class="card-desc">所有活動合併總排名</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div class="divider"></div>

  <div class="section-label">👮 管理員</div>
  <a href="admin/index.html" class="card-link">
    <div class="card-icon admin">🛠️</div>
    <div class="card-body">
      <div class="card-title">管理員後台</div>
      <div class="card-desc">管理組別、尋寶、搶答、積分</div>
    </div>
    <div class="card-arrow">›</div>
  </a>
</div>
</body>
</html>
