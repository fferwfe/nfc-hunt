<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>活動系統 · 入口</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root{--bg:#f5f5f7;--card:#fff;--border:#e5e5e7;--text:#1d1d1f;--text2:#6e6e73;--green:#1D9E75;--blue:#1f4e7a;--red:#b8341f;--gold:#b8941f;--radius:16px;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 60px;}
  .container{max-width:480px;margin:0 auto;}
  .header{text-align:center;padding:32px 0 28px;}
  .header-icon{font-size:48px;margin-bottom:12px;}
  .header-title{font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:6px;}
  .header-sub{font-size:13px;color:var(--text2);}
  .section{margin-bottom:28px;}
  .section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;padding-left:4px;}
  .card-link{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;text-decoration:none;color:var(--text);transition:all 0.15s;cursor:pointer;}
  .card-link:hover{border-color:var(--green);box-shadow:0 2px 12px rgba(0,0,0,0.08);}
  .card-link:active{transform:scale(0.98);}
  .card-icon{font-size:28px;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card-icon.admin{background:rgba(31,78,122,0.1);}
  .card-icon.player{background:rgba(29,158,117,0.1);}
  .card-icon.screen{background:rgba(184,148,31,0.1);}
  .card-icon.nfc{background:rgba(184,52,31,0.1);}
  .card-icon.quiz{background:rgba(29,158,117,0.1);}
  .card-icon.score{background:rgba(184,148,31,0.1);}
  .card-body{flex:1;}
  .card-title{font-size:16px;font-weight:700;margin-bottom:2px;}
  .card-desc{font-size:12px;color:var(--text2);}
  .card-arrow{font-size:18px;color:var(--text2);}
  .divider{height:1px;background:var(--border);margin:24px 0;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">🎯</div>
    <div class="header-title">活 動 系 統</div>
    <div class="header-sub">選擇你的角色進入對應頁面</div>
  </div>

  <!-- 管理員 -->
  <div class="section">
    <div class="section-label">👮 管理員</div>
    <a href="admin.html" class="card-link">
      <div class="card-icon admin">🛠️</div>
      <div class="card-body">
        <div class="card-title">管理員後台</div>
        <div class="card-desc">管理所有活動、題目、積分、組別</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>

  <!-- 玩家 -->
  <div class="section">
    <div class="section-label">📱 玩家</div>
    <a href="player-nfc.html" class="card-link">
      <div class="card-icon nfc">🗺️</div>
      <div class="card-body">
        <div class="card-title">尋寶闖關</div>
        <div class="card-desc">NFC 卡片尋寶、掃卡過關</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a href="player-quiz.html" class="card-link">
      <div class="card-icon quiz">🎮</div>
      <div class="card-body">
        <div class="card-title">搶答遊戲</div>
        <div class="card-desc">按鈕搶答、即時競賽</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a href="player-score.html" class="card-link">
      <div class="card-icon score">⭐</div>
      <div class="card-body">
        <div class="card-title">我的積分</div>
        <div class="card-desc">查看尋寶＋搶答的總分</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>

  <!-- 大螢幕 -->
  <div class="section">
    <div class="section-label">📺 大螢幕</div>
    <a href="screen-nfc.html" class="card-link">
      <div class="card-icon nfc">🗺️</div>
      <div class="card-body">
        <div class="card-title">尋寶排行榜</div>
        <div class="card-desc">即時顯示各組尋寶進度</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a href="screen-quiz.html" class="card-link">
      <div class="card-icon quiz">🎮</div>
      <div class="card-body">
        <div class="card-title">搶答大螢幕</div>
        <div class="card-desc">題目、計時、搶答、排行榜</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
    <a href="screen-total.html" class="card-link">
      <div class="card-icon score">🏆</div>
      <div class="card-body">
        <div class="card-title">總積分榜</div>
        <div class="card-desc">尋寶＋搶答合併總排名</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>
</div>
</body>
</html>
