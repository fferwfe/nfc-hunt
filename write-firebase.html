<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC 寫卡工具 · 探險手札</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Special+Elite&family=JetBrains+Mono:wght@400;700&display=swap');
  :root{--paper:#f0e3c4;--paper-dark:#d9c89e;--ink:#2b1d12;--ink-soft:#5a4a35;--stamp-red:#b8341f;--success:#2d6a3e;--error:#a82626;--gold:#b8941f;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{min-height:100vh;font-family:'Noto Serif TC',serif;color:var(--ink);background:var(--paper);
    background-image:radial-gradient(ellipse at top left,rgba(255,255,255,0.4),transparent 60%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.15 0 0 0 0 0.08 0 0 0 0.15 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
  .container{max-width:480px;margin:0 auto;padding:24px 20px 60px;}
  .header{text-align:center;padding:12px 0 20px;border-bottom:2px dashed var(--ink-soft);margin-bottom:24px;}
  .header .deco{font-family:'Special Elite';font-size:11px;letter-spacing:3px;color:var(--ink-soft);margin-bottom:6px;}
  .header h1{font-size:24px;font-weight:900;letter-spacing:3px;}
  .header .sub{font-family:'Special Elite';font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .card{background:rgba(255,250,235,0.6);border:1.5px solid var(--ink-soft);padding:20px;margin-bottom:18px;position:relative;box-shadow:2px 3px 0 rgba(0,0,0,0.08);}
  .warn{background:rgba(184,52,31,0.1);border:1.5px solid var(--stamp-red);padding:14px 16px;margin-bottom:18px;font-size:13px;line-height:1.7;color:var(--ink);}
  .warn strong{color:var(--stamp-red);}
  .label{font-family:'Special Elite';font-size:11px;letter-spacing:2px;color:var(--ink-soft);margin-bottom:8px;text-transform:uppercase;}
  select,.url-input{width:100%;background:var(--paper);border:1.5px solid var(--ink-soft);padding:10px 12px;font-family:'Noto Serif TC';font-size:16px;color:var(--ink);margin-bottom:14px;}
  .station-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .station-btn{width:44px;height:44px;border:1.5px solid var(--ink-soft);background:var(--paper);font-family:'Special Elite';font-size:16px;font-weight:700;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .station-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .station-btn.written{border-color:var(--success);color:var(--success);position:relative;}
  .station-btn.written::after{content:'✓';position:absolute;top:-6px;right:-6px;background:var(--success);color:#fff;font-size:10px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .url-preview{background:rgba(43,29,18,0.06);border-left:3px solid var(--ink);padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;word-break:break-all;margin-bottom:16px;color:var(--ink-soft);line-height:1.6;}
  .btn{display:block;width:100%;padding:16px;background:var(--ink);color:var(--paper);border:none;font-family:'Noto Serif TC';font-size:17px;font-weight:700;letter-spacing:3px;cursor:pointer;text-align:center;margin-top:8px;}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:0.4;}
  .btn.ghost{background:transparent;color:var(--ink);border:2px solid var(--ink);}
  .btn-link{background:transparent;color:var(--ink-soft);text-decoration:underline;font-size:13px;padding:8px;}
  .status{text-align:center;padding:18px;margin-top:16px;border:2px solid var(--ink);display:none;}
  .status.show{display:block;animation:popIn 0.4s cubic-bezier(0.18,0.89,0.32,1.28);}
  .status.waiting{border-color:var(--gold);background:rgba(184,148,31,0.1);}
  .status.success{border-color:var(--success);background:rgba(45,106,62,0.1);}
  .status.error{border-color:var(--error);background:rgba(168,38,38,0.1);}
  @keyframes popIn{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .status-icon{font-size:40px;margin-bottom:8px;}
  .status-title{font-size:18px;font-weight:700;margin-bottom:4px;}
  .status-body{font-size:14px;color:var(--ink-soft);line-height:1.6;}
  @keyframes radar{0%{transform:scale(0.9);opacity:1;}100%{transform:scale(1.4);opacity:0;}}
  .radar{display:inline-block;width:50px;height:50px;border:3px solid var(--gold);border-radius:50%;animation:radar 1.2s infinite;}
  .footer{text-align:center;margin-top:30px;font-family:'Special Elite';font-size:10px;letter-spacing:2px;color:var(--ink-soft);opacity:0.6;}
  .mode-toggle{display:flex;gap:0;margin-bottom:18px;border:1.5px solid var(--ink);}
  .mode-toggle button{flex:1;padding:10px;background:transparent;border:none;font-family:'Noto Serif TC';font-weight:700;cursor:pointer;color:var(--ink-soft);}
  .mode-toggle button.active{background:var(--ink);color:var(--paper);}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="deco">— NFC WRITER · 寫 卡 工 具 —</div>
    <h1>NFC 寫卡工具</h1>
    <div class="sub">把網址寫入空白卡片</div>
  </div>

  <div id="compatWarn" class="warn" style="display:none">
    <strong>⚠ 此裝置不支援網頁寫卡</strong><br>
    Web NFC 只能在 <strong>Android 手機的 Chrome 瀏覽器</strong>使用。<br>
    若你用 iPhone 或電腦，請改用「NFC Tools」App 手動寫入（網址清單見下方）。
  </div>

  <div id="writerUI">
    <div class="card">
      <div class="label">★ 選擇要寫的卡片</div>
      <div class="label" style="margin-top:4px">路線</div>
      <select id="routeSelect" onchange="onRouteChange()"></select>
      <div class="label">站號（點選）</div>
      <div id="stationPicker" class="station-picker"></div>
      <div class="label">將寫入的網址</div>
      <div id="urlPreview" class="url-preview">請先選擇路線與站號</div>
      <button id="writeBtn" class="btn" onclick="startWrite()">📲 開始寫入（手機靠卡）</button>
      <div id="status" class="status">
        <div id="statusIcon" class="status-icon"></div>
        <div id="statusTitle" class="status-title"></div>
        <div id="statusBody" class="status-body"></div>
      </div>
      <button class="btn ghost" style="margin-top:14px" onclick="toggleAutoNext()">
        <span id="autoNextLabel">⊙ 連續寫卡模式：關</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="label">★ 手動寫卡網址清單（iPhone 用 NFC Tools 貼這些）</div>
    <div id="manualList" style="font-family:'JetBrains Mono';font-size:11px;line-height:1.8;word-break:break-all;color:var(--ink-soft)"></div>
    <button class="btn-link" onclick="copyAll()">📋 全部複製</button>
  </div>

  <div class="footer">— NFC WRITER · 探險手札 —</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCtE0kZWmyt2UiAq2as5g65pfKIzm9QQE",
  authDomain: "nfc-hunt-a9cb3.firebaseapp.com",
  projectId: "nfc-hunt-a9cb3",
  storageBucket: "nfc-hunt-a9cb3.firebasestorage.app",
  messagingSenderId: "376155129888",
  appId: "1:376155129888:web:8d4d214f50777580325445"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
let CARDS = [];
let CONFIG = null;
let currentRoute = null;
let currentStation = null;
let autoNext = false;
let writtenSet = new Set();

const nfcSupported = ('NDEFReader' in window);

async function init() {
  if (!nfcSupported) {
    $('compatWarn').style.display = 'block';
    $('writeBtn').disabled = true;
    $('writeBtn').textContent = '此裝置不支援網頁寫卡';
  }
  try {
    const snap = await getDoc(doc(db,'config','game'));
    if (!snap.exists()) { $('urlPreview').textContent='找不到設定，請先在後台設定路線'; return; }
    CONFIG = snap.data();
    const siteUrl = localStorage.getItem('admin_siteUrl') || location.origin+'/player.html';
    CARDS = [];
    Object.entries(CONFIG.routes||{}).forEach(([code,r]) => {
      for (let i=1;i<=r.stations;i++) {
        const key=(r.keys||[])[i-1]||'key';
        CARDS.push({ route:code, station:i, key, url:`${siteUrl}?r=${code}&n=${i}&k=${key}`, label:`路線${code}-第${i}站` });
      }
    });
  } catch(e) {
    $('urlPreview').textContent='無法載入設定：'+e.message;
  }
  renderRouteOptions();
  renderManualList();
}

function renderRouteOptions() {
  const routes = [...new Set(CARDS.map(c=>c.route))];
  $('routeSelect').innerHTML = routes.map(r=>`<option value="${r}">路線 ${r}</option>`).join('');
  if (routes.length) { currentRoute=routes[0]; renderStationPicker(); }
}

window.onRouteChange = function() {
  currentRoute = $('routeSelect').value;
  currentStation = null;
  renderStationPicker();
  updatePreview();
}

function renderStationPicker() {
  const stations = CARDS.filter(c=>c.route===currentRoute).sort((a,b)=>a.station-b.station);
  $('stationPicker').innerHTML = stations.map(c => {
    const key=c.route+'-'+c.station;
    const written=writtenSet.has(key)?' written':'';
    const active=(c.station===currentStation)?' active':'';
    return `<button class="station-btn${active}${written}" onclick="pickStation(${c.station})">${c.station}</button>`;
  }).join('');
}

window.pickStation = function(n) {
  currentStation=n; renderStationPicker(); updatePreview();
}

function getCurrentCard() { return CARDS.find(c=>c.route===currentRoute&&c.station===currentStation); }

function updatePreview() {
  const card=getCurrentCard();
  $('urlPreview').textContent=card?card.url:'請選擇站號';
}

window.startWrite = async function() {
  const card=getCurrentCard();
  if (!card){showStatus('error','✗','尚未選擇','請先選擇路線和站號');return;}
  if (!nfcSupported) return;
  showStatus('waiting','<span class="radar"></span>','請將手機靠近空白卡片',`正在寫入：路線 ${card.route} 第 ${card.station} 站`);
  try {
    const ndef=new NDEFReader();
    await ndef.write({ records:[{recordType:"url",data:card.url}] });
    writtenSet.add(card.route+'-'+card.station);
    renderStationPicker();
    showStatus('success','✓','寫入成功！',`路線 ${card.route} 第 ${card.station} 站已寫好。<br>建議在卡背標記「${card.route}-${card.station}」`);
    if (navigator.vibrate) navigator.vibrate([100,50,100]);
    if (autoNext) {
      const stations=CARDS.filter(c=>c.route===currentRoute).sort((a,b)=>a.station-b.station);
      const idx=stations.findIndex(c=>c.station===currentStation);
      if (idx>=0&&idx<stations.length-1) {
        setTimeout(()=>{
          pickStation(stations[idx+1].station);
          showStatus('waiting','➜','下一張',`準備寫：第 ${currentStation} 站，點「開始寫入」`);
        },1500);
      }
    }
  } catch(e) {
    let msg=e.message||'寫入失敗';
    if (e.name==='NotAllowedError') msg='需要允許 NFC 權限，或卡片無法寫入（可能是唯讀卡）';
    showStatus('error','✗','寫入失敗',msg);
    if (navigator.vibrate) navigator.vibrate([200]);
  }
}

function showStatus(type,icon,title,body) {
  const s=$('status'); s.className='status show '+type;
  $('statusIcon').innerHTML=icon; $('statusTitle').textContent=title; $('statusBody').innerHTML=body;
}

window.toggleAutoNext = function() {
  autoNext=!autoNext;
  $('autoNextLabel').textContent=autoNext?'⊙ 連續寫卡模式：開':'⊙ 連續寫卡模式：關';
}

function renderManualList() {
  if (!CARDS.length){$('manualList').textContent='（需先在後台設定路線）';return;}
  const grouped={};
  CARDS.forEach(c=>{ (grouped[c.route]=grouped[c.route]||[]).push(c); });
  $('manualList').innerHTML=Object.entries(grouped).map(([r,cards])=>`
    <div style="margin-bottom:12px">
      <strong style="font-family:'Noto Serif TC';color:var(--ink)">路線 ${r}</strong><br>
      ${cards.map(c=>`第 ${c.station} 站 → ${c.url}`).join('<br>')}
    </div>
  `).join('');
  window._allText=CARDS.map(c=>`[路線${c.route}-第${c.station}站] ${c.url}`).join('\n');
}

window.copyAll = function() {
  if (!window._allText) return;
  navigator.clipboard.writeText(window._allText).then(()=>alert('已複製全部網址'));
}

init();
</script>
</body>
</html>
